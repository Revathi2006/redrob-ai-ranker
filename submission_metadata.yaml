ai_usage_summary: |
  ChatGPT and DeepSeek were used during development for architectural
  discussions, implementation guidance, debugging, documentation,
  code review, and general software engineering assistance. These
  tools were used solely as development assistants. The retrieval
  pipeline, feature engineering, ranking methodology, preprocessing,
  testing, and final implementation were designed, integrated, and
  validated by the team. No external AI services are used during
  preprocessing or inference, and the complete ranking pipeline runs
  offline after preprocessing.

# Summary of the ranking approach for judges.
# Covers the hybrid architecture, preprocessing strategy, and all
# key components including 23 Redrob signals and skill ontology.
methodology_summary: |
  Our solution is a hybrid AI candidate ranking system that combines
  semantic retrieval using BGE-M3 embeddings with FAISS HNSW, keyword
  retrieval using BM25, engineered candidate features, and all 23
  Redrob behavioral signals for comprehensive candidate evaluation.

  During one-time offline preprocessing, candidate embeddings are
  generated, FAISS and BM25 indexes are built, candidate features are
  extracted, percentile normalization is applied, and a skill ontology
  is created. During ranking, the job description is embedded, FAISS
  retrieves the most relevant candidates, BM25 reranks the shortlist,
  and adaptive weighting combines semantic similarity, keyword
  relevance, engineered features, and behavioral signals.

  The system incorporates ontology-based skill matching, experience
  alignment, career authenticity scoring, retrieval specialization,
  AI experience analysis, career progression analysis, honeypot
  detection, and explainable reasoning generation. All 23 Redrob
  behavioral signals are incorporated into the scoring pipeline,
  covering recruiter engagement, pipeline conversion, visibility,
  responsiveness, professional network strength, candidate activity,
  job fit, and administrative readiness. GPU is used only for the
  one-time preprocessing stage, while the online ranking pipeline
  runs entirely on CPU without network access and produces the final
  submission.csv containing the Top-100 ranked candidates with
  human-readable reasoning.

